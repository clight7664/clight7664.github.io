name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Add permissions block (critical for GITHUB_TOKEN to work)
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Updated from v2

      - name: Setup .NET SDK 10.0.x
        uses: actions/setup-dotnet@v4  # Updated from v1
        with:
          dotnet-version: "10.0.x"

      - name: Publish .NET Project
        run: dotnet publish ./BlazorGitHubPagesDemo/BlazorGitHubPagesDemo.csproj -c Release -o release --nologo

      - name: Change base-tag in index.html
        run: sed -i 's/<base href="\/" \/>/<base href="\/BlazorGitHubPagesDemo\/" \/>/g' release/wwwroot/index.html

      - name: Copy index.html to 404.html
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Add .nojekyll file
        run: touch release/wwwroot/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4  # Updated to v4 (latest)
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: release/wwwroot
          clean: true  # Clean existing files